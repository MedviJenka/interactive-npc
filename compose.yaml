services:
  npc_service:
    container_name: npc_service
    build:
      context: .
      dockerfile: Dockerfile
      target: npc_service
    env_file:
      - .env
    ports:
      - "5555:5555"
    volumes:
      - memory:/app/.crewai/memory
    networks:
      - app
    restart: unless-stopped


networks:
  app:

volumes:
  memory:
